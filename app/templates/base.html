<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Sistema de Ponto de Venda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .login-container {
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(135deg, #4a0e17 0%, #1a0813 50%, #0d1117 100%);
            border: 1px solid #21262d;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* --- Lado Esquerdo (Boas-vindas) --- */
        .welcome-side {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #ffffff;
            position: relative;
        }

        .logo-senai {
            font-size: 28px;
            font-weight: 800;
            font-style: italic;
            color: #ffffff;
            background-color: #e63946;
            padding: 5px 15px;
            display: inline-block;
            width: fit-content;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .welcome-side h2 {
            font-size: 16px;
            font-weight: 400;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .welcome-side h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .welcome-side h1 span {
            color: #e63946;
        }

        .welcome-side p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* Benefícios / Features */
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(230, 57, 70, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e63946;
            font-size: 16px;
        }

        .feature-text {
            font-size: 15px;
            font-weight: 500;
            color: #e2e8f0;
        }

        /* Detalhe de pontinhos decorativos */
        .dots-pattern {
            position: absolute;
            bottom: 40px;
            left: 60px;
            opacity: 0.15;
            display: grid;
            grid-template-columns: repeat(5, 8px);
            gap: 8px;
        }
        .dots-pattern span {
            width: 4px;
            height: 4px;
            background-color: #fff;
            border-radius: 50%;
        }

        /* --- Lado Direito (Card de Login) --- */
        .form-side {
            background-color: #ffffff;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .form-header h2 {
            font-size: 28px;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            color: #334155;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        /* Ícone de olho na senha */
        .toggle-password {
            position: absolute;
            right: 16px;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
        }

        /* Opções Extras (Lembrar-me e Esqueci a senha) */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #334155;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
        }

        .forgot-password {
            color: #e63946;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Botões */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #e63946;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background-color: #d62837;
        }

        .divider {
            text-align: center;
            position: relative;
            margin-bottom: 16px;
        }

        .divider span {
            font-size: 12px;
            color: #94a3b8;
            background-color: #ffffff;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #e2e8f0;
            z-index: 0;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: #f1f5f9;
            color: #334155;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        /* Rodapé */
        .form-footer {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 24px;
        }

        /* --- Responsividade para telas menores --- */
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 450px;
            }
            .welcome-side {
                display: none; /* Oculta o lado esquerdo em celulares para focar no login */
            }
            .form-side {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="welcome-side">
            <div class="logo-senai">SENAI</div>
            
            <h2>Bem-vindo(a) ao</h2>
            <h1>Sistema de<br><span>Ponto de Venda</span></h1>
            <p>Faça login para continuar</p>
            
            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="feature-text">Vendas mais rápidas</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-cubes"></i></div>
                    <div class="feature-text">Gestão inteligente</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-chart-bar"></i></div>
                    <div class="feature-text">Relatórios em tempo real</div>
                </div>
            </div>

            <div class="dots-pattern">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="form-side">
            <div class="form-content">
                <div class="form-header">
                    <h2>Entrar</h2>
                    <p>Acesse sua conta para continuar</p>
                </div>

                <form>
                    <div class="input-group">
                        <label for="usuario">Usuário</label>
                        <div class="input-wrapper">
                            <input type="text" id="usuario" placeholder="Digite seu usuário">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="senha" placeholder="Digite seu senha">
                            <i class="fa-regular fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            Lembrar-me
                        </label>
                        <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>
                    
                    <div class="divider">
                        <span>ou</span>
                    </div>

                    <button type="button" class="btn-secondary">
                        <i class="fa-solid fa-lock"></i> Entrar com código
                    </button>
                </form>
            </div>

            <div class="form-footer">
                © 2024 SENAI - Todos os direitos reservados.
            </div>
        </div>

    </div>

</body>
</html>
